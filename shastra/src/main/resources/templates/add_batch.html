<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Student Details Display</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" 
integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
 crossorigin="anonymous">
</head>
<body>
<div class="container">
<div class="row"></div>
<h1 class="text-center">Add Students In Batch</h1>
<div class="card-body">
<form th:action="@{/addBatch}" th:object="${batch}" method="post">
<div class="form_group">
<label>Students BatchName:</label>
<input 
type="text"
name="batchName"
th:field="*{batchName}"
class="form-control"
placeholder="Enter The Student batchName"
/>
</div>
<div class="form_group">
<label>Students CourseName:</label>
<input 
type="text"
name="courseName"
th:field="*{courseName}"
class="form-control"
placeholder="Enter The Student courseName"
/>
</div>
<div class="footer-body">
<button type="submit" class="btn-btn-primary">Submit</button>
</div>
</form>
</div>
</div>
</body>
</html>
