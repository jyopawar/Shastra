<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Student Details Display</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" 
integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
 crossorigin="anonymous">
</head>
<body>

<div class= "container">
<div class="row">
<h3>List of Student</h3>
</div>
<div class ="row">
<div class="col-lg-6">
<a th:href="@{/addNewStudent}" class="btn btn-primary btn-sm mb-3 ">Add Student</a>
<a th:href="@{/addBatchStudent}" class="btn btn-success btn-sm mb-3 float-right">AddToBatch</a>
</div>
</div>
<table class=table table-striped table-bordered>
<thead class= table-dark>
<tr>
<th></th>
<th> Student FirstName</th>
<th> Student MiddleName</th>
<th> Student LaststName</th>
<th> Student phone</th>
<th> Student email</th>
<th> Action</th>
</tr>
</thead>
<tbody>

<tr th:each="student:${students}"> 
 <td><input type="checkbox"></td>
<td th:text="${student.firstName}"></td>
<td th:text="${student.middleName}"></td>
<td th:text="${student.lastName}"></td>
<td th:text="${student.phone}"></td>
<td th:text="${student.email}"></td>

<td>
<a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-primary">Update</a>
<a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-danger">Delete</a>

</tr>
</tbody>
 
 </table>
</div>

</body>
</html>
